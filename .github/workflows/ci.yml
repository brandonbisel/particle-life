name: CI

on:
  push:
    branches:
      - dev
      - "release/**"
  pull_request:
    branches:
      - dev
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint & static analysis ──────────────────────────────────────────────────
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Doc check
        run: cargo doc --no-deps

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev

      - name: Run tests
        run: cargo test

  # ── Release builds (all platforms) ─────────────────────────────────────────
  build:
    name: Build / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: target/release/ParticleLife
          - name: Windows
            os: windows-2025
            artifact: target/release/ParticleLife.exe
          - name: macOS
            os: macos-latest
            artifact: target/release/ParticleLife
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev

      - name: Build (release)
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: particle-life-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
