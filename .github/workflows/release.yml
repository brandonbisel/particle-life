name: Release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build release binaries for all platforms ────────────────────────────────
  build:
    name: Build / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: target/release/ParticleLife
            asset_name: particle-life-linux-x86_64
          - name: Windows
            os: windows-latest
            artifact: target/release/ParticleLife.exe
            asset_name: particle-life-windows-x86_64.exe
          - name: macOS
            os: macos-latest
            artifact: target/release/ParticleLife
            asset_name: particle-life-macos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev

      - name: Build (release)
        run: cargo build --release

      - name: Rename artifact
        shell: bash
        run: cp "${{ matrix.artifact }}" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  # ── Create GitHub Release with all binaries ─────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/particle-life-linux-x86_64/particle-life-linux-x86_64
            artifacts/particle-life-windows-x86_64.exe/particle-life-windows-x86_64.exe
            artifacts/particle-life-macos/particle-life-macos
